<%+header%>
<h2 name="content"><%:Maximum Frequency%></h2>
<div class="cbi-section">
    <div class="cbi-section-descr">
        <span id="max-frequency">Loading...</span>
    </div>
</div>
<script type="text/javascript">
    XHR.poll(5, '<%=luci.dispatcher.build_url("admin/services/cpufreq/max_frequency")%>', null,
        function(x, data) {
            if (data && data.frequency) {
                document.getElementById('max-frequency').innerHTML = 
                    '<strong>' + data.frequency + '</strong>';
            }
        }
    );
</script>
