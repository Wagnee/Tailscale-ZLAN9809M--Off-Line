# auto-update-whitelist.conf
# Whitelist de scripts permitidos para execução automática
#
# Formato: nome_script.sh:descrição
#
# Scripts listados aqui são os únicos que podem ser executados
# automaticamente pelo daemon de auto-update.

# Scripts de exemplo
hello-world-mqtt.sh:Envia mensagem Hello World via MQTT
update.sh:Script de teste que imprime mensagem de funcionamento

# Scripts úteis (para implementação futura)
# update-firmware.sh:Atualiza firmware do roteador
# config-backup.sh:Faz backup das configurações
# system-check.sh:Verifica saúde do sistema
# log-rotate.sh:Rotaciona logs antigos
# cache-clear.sh:Limpa cache do sistema
